<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2540"/>
      <stop offset="100%" style="stop-color:#1a3a5a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5a0"/>
      <stop offset="100%" style="stop-color:#3a86ff"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative elements -->
  <circle cx="1050" cy="80" r="200" fill="#3a86ff" opacity="0.1"/>
  <circle cx="150" cy="550" r="300" fill="#00f5a0" opacity="0.1"/>
  
  <!-- G-Stack Logo/Text -->
  <text x="600" y="280" font-family="Poppins, Arial, sans-serif" font-size="120" font-weight="800" fill="#ffffff" text-anchor="middle">G-Stack</text>
  
  <!-- Tagline -->
  <text x="600" y="350" font-family="Poppins, Arial, sans-serif" font-size="36" font-weight="400" fill="#00f5a0" text-anchor="middle">Web Development Services</text>
  
  <!-- Divider -->
  <rect x="350" y="380" width="500" height="4" fill="url(#accent)" rx="2"/>
  
  <!-- Services -->
  <text x="600" y="430" font-family="Poppins, Arial, sans-serif" font-size="24" font-weight="500" fill="#ffffff" text-anchor="middle">Frontend • Full-Stack • Backend</text>
  
  <!-- Technologies -->
  <text x="600" y="480" font-family="Poppins, Arial, sans-serif" font-size="18" fill="#3a86ff" text-anchor="middle">React • Next.js • TypeScript • Node.js • Laravel • MongoDB</text>
  
  <!-- CTA -->
  <text x="600" y="540" font-family="Poppins, Arial, sans-serif" font-size="28" font-weight="600" fill="#ffffff" text-anchor="middle">Transform Your Ideas Into Reality</text>
  
  <!-- Border -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#00f5a0" stroke-width="2" rx="20"/>
</svg>